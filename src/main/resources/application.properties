spring.application.name=grouproject

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Note: The database URL, username, and password are stored in environment variables for security reasons. 
spring.datasource.url=${CMPT_DB_URL}
spring.datasource.username=${CMPT_DB_USERNAME}
spring.datasource.password=${CMPT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set PostgreSQL dialect for Hibernate 7.x
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Defer datasource initialization until connection is available
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.session.jdbc.initialize-schema=always
spring.session.jdbc.platform=postgresql