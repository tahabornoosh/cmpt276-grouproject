
<th:block th:replace="~{fragments/layout :: head('Admin Dashboard')}"></th:block>
<th:block th:replace="~{fragments/layout :: bodyStart}"></th:block>
<input type="hidden" id="activeMenuItem" name="activeMenuItem" value="menu-admin" />

<main class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6"><h1>Admin Dashboard</h1></div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div class="card">
        <div class="card-header"><h3 class="card-title">Users</h3></div>
        <div class="card-body">
          <table id="usersTable" class="table table-bordered table-striped">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Gender</th><th>Role</th><th>Actions</th></tr>
            </thead>
            <tbody>
              <tr th:each="u : ${users}">
                <td th:text="${u.first_name} + ' ' + ${u.last_name}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.gender}"></td>
                <td th:text="${u.role}"></td>
                <td>
                  <a th:href="@{'/profile/' + ${u.id}}" class="btn btn-info btn-sm">View Public Profile</a>
                  <a th:if="${currentUser.isAdmin()}" th:href="@{'/account/edit/' + ${u.id}}" class="btn btn-warning btn-sm">Edit Account</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.jQuery && window.jQuery.fn.DataTable) {
        $('#usersTable').DataTable({ responsive: true, lengthChange: false, autoWidth: false });
      }
    });
  </script>
</main>

<th:block th:replace="~{fragments/layout :: bodyEnd}"></th:block>
