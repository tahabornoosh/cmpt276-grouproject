<th:block th:replace="~{fragments/layout :: head('Chat')}"></th:block>
<th:block th:replace="~{fragments/layout :: bodyStart}"></th:block>
<input type="hidden" id="activeMenuItem" name="activeMenuItem" value="menu-chat" />

    <style>
      .overflow-hidden {
        overflow: hidden !important;
      }

      .overflow-auto {
        overflow: auto !important;
      }

      .flex-shrink-0 {
        flex-shrink: 0 !important;
      }

      .chat-app {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 0;
        height: calc(100vh - 14rem);
        min-height: 40rem;
        border-radius: 0.25rem;
        overflow: hidden;
        margin-bottom: 0;
        background: #ffffff;
        border: 1px solid #dee2e6;
      }
      @media (max-width: 768px) {
        .chat-app {
          grid-template-columns: 1fr;
        }
        .chat-app .chat-contacts {
          display: none;
        }
      }
      .chat-contacts {
        background: #f4f6f9;
        border-right: 1px solid #dee2e6;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .chat-contact {
        display: flex;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        cursor: pointer;
        border-bottom: 1px solid #dee2e6;
        text-decoration: none;
        color: inherit;
      }
      .chat-contact:hover {
        background: #ffffff;
      }
      .chat-contact.active {
        background: #ffffff;
        border-left: 3px solid #007bff;
        padding-left: calc(1rem - 3px);
      }
      .chat-avatar {
        position: relative;
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.8rem;
      }
      .chat-avatar.online::after {
        content: '';
        position: absolute;
        bottom: 0;
        right: 0;
        width: 10px;
        height: 10px;
        background: #28a745;
        border: 2px solid #ffffff;
        border-radius: 50%;
      }
      .chat-conversation {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .chat-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #dee2e6;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background: #f4f6f9;
      }
      .chat-message {
        display: flex;
        margin-bottom: 0.75rem;
      }
      .chat-message.me {
        justify-content: flex-end;
      }
      .chat-bubble {
        max-width: 70%;
        padding: 0.5rem 0.75rem;
        border-radius: 1rem;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .chat-message.them .chat-bubble {
        background: #ffffff;
        border: 1px solid #dee2e6;
        border-bottom-left-radius: 0.25rem;
      }
      .chat-message.me .chat-bubble {
        background: #007bff;
        color: #fff;
        border-bottom-right-radius: 0.25rem;
      }
      .chat-time {
        font-size: 0.7rem;
        opacity: 0.7;
        display: block;
        margin-top: 0.15rem;
      }
      .chat-composer {
        padding: 0.75rem;
        border-top: 1px solid #dee2e6;
      }

      .unread-badge {
        width: 9px;
        height: 9px;
        flex-shrink: 0;
        border-radius: 50%;
        background: #007bff;
        margin-left: 0.5rem;
      }
    </style>

<main class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>
            Chat
          </h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item active">Chat</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div 
      class="card card-primary card-outline chat-app"
      id="chat-app"
      th:attr="data-current-user-id=${currentUser.id}, data-requested-user-id=${requestedUserId}"
      >
        <!-- Contacts -->
        <aside class="chat-contacts">
          <div class="p-3 border-bottom">
            <div class="input-group input-group-sm">
              <span class="input-group-text bg-white">
                <i class="fas fa-search" aria-hidden="true"></i>
              </span>
              <!--Search feature-->
              <input type="search" class="form-control" placeholder="Search contacts…" id="contact-search" aria-label="Search contacts">
</div>
          </div>
          <div class="flex-grow-1 overflow-auto" id="chat-contacts">
            <a
              href="#"
              class="chat-contact"
              th:each="contact : ${contacts}"
              th:attr="
                data-user-id=${contact.userId},
                data-user-name=${contact.firstName + ' ' + contact.lastName},
                data-user-initials=${#strings.substring(contact.firstName, 0 , 1) + #strings.substring(contact.lastName, 0, 1)}
                "
              >
                <span
                  class="chat-avatar bg-primary text-white"
                  th:text="${#strings.substring(contact.firstName, 0, 1) + #strings.substring(contact.lastName, 0, 1)}"
                  >
                  AB
                </span>

                <div class="flex-grow-1 overflow-hidden">
                  <div class="d-flex align-items-center w-100">
                    <p
                      class="mb-0 text-truncate flex-grow-1"
                      th:text="${contact.firstName + ' ' + contact.lastName}"
                      >
                        First Last
                    </p>

                    <small
                      class="text-muted flex-shrink-0 ml-2 chat-contact-time"
                      th:attr="data-sent-at=${contact.lastMessageAt}"
                      ></small>

                    <span
                      class="unread-badge"
                      th:if="${contact.unread}"
                      title="Unread message"
                      aria-label="Unread message"
                    ></span>
                  </div>

                  <small
                    class="text-truncate text-muted d-block chat-contact-preview"
                    >
                      <span
                        th:if="${contact.lastMessageSentByCurrentUser}"
                        >You: </span><span
                        th:text="${contact.lastMessage}"
                        >Latest message</span>
                  </small>
                </div>
            </a>

            <p
              class="p-3 text-muted"
              th:if="${#lists.isEmpty(contacts)}"
              >
              No conversations yet.
            </p>
          </div>
        </aside>

        <!-- Conversation -->
        <section class="chat-conversation">
          <header class="chat-header">
            <div class="dropdown" id="chat-actions" hidden>
              <button
                class="btn btn-light btn-sm"
                type="button"
                id="chat-actions-button"
                data-toggle="dropdown"
                aria-haspopup="true"
                aria-expanded="false"
                aria-label="Conversation actions"
              >
                <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
              </button>
              <div class="dropdown-menu dropdown-menu-left">
                <button
                  class="dropdown-item text-danger"
                  type="button"
                  id="toggle-block-button"
                >
                  Block user
                </button>
              </div>
            </div>

            <span
              class="chat-avatar bg-primary text-white"
              id="selected-user-avatar"
              >
              ?
            </span>

            <div class="flex-grow-1">
              <p
                class="mb-0 font-weight-bold"
                id="selected-user-name"
                >
                Select a conversation
              </p>

              <small
                class="text-danger d-block"
                id="block-status-message"
                hidden
              ></small>

              <small hidden class="text-muted" id="connection-status">
                Connecting...
              </small>
            </div>
          </header>

          <div class="chat-messages" id="chat-messages">
            <p class="text-center text-muted" id="empty-chat-message">
              Select a user to view your conversation.
            </p>
          </div>

          <form class="chat-composer" id="chat-composer">
            <div class="input-group">
              <input
                type="text"
                class="form-control"
                placeholder="Select a user first.."
                aria-label="Type a message"
                id="chat-input"
                maxlength="300"
                autocomplete="off"
                disabled
                >
                <button
                  class="btn btn-primary"
                  id="send-message-button"
                  type="submit"
                  disabled
                  >
                    <i
                      class="fas fa-paper-plane"
                      aria-hidden="true"
                      ></i>
                </button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const chatApp = document.getElementById("chat-app");
    const messageContainer =
      document.getElementById("chat-messages");
    const messageForm =
      document.getElementById("chat-composer");
    const messageInput =
      document.getElementById("chat-input");
    const sendButton = 
      document.getElementById("send-message-button");
    const selectedUserName =
      document.getElementById("selected-user-name");
    const selectedUserAvatar =
      document.getElementById("selected-user-avatar");
    const connectionStatus =
      document.getElementById("connection-status");
    const chatActions =
      document.getElementById("chat-actions");
    const toggleBlockButton =
      document.getElementById("toggle-block-button");
    const blockStatusMessage =
      document.getElementById("block-status-message");
    const contactSearch = 
      document.getElementById("contact-search")
    const contactsContainer = 
      document.getElementById("chat-contacts")

    const contactElements =
      Array.from(document.querySelectorAll(".chat-contact"));

    const relativeTimeFormatter = 
        new Intl.RelativeTimeFormat("en", {
          numeric: "always"
        });
      
    function formatRelativeTime(timestamp) {
      if (!timestamp) {
        return "";
      }

      const messageTime = 
        new Date(timestamp).getTime();

      if (Number.isNaN(messageTime)) {
        return "";
      }

      const differenceInSeconds = 
        Math.round(
          (messageTime - Date.now()) / 1000);

      const absoluteSeconds = 
        Math.abs(differenceInSeconds);

      if (absoluteSeconds < 60) {
        return "just now";
      }

      if (absoluteSeconds < 3600) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 60),
          "minute"
        )
      };

      if (absoluteSeconds < 86400) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 3600),
          "hour"
        );
      }

      if (absoluteSeconds < 604800) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 86400),
          "day"
        );
      }

      return new Date(timestamp).toLocaleDateString();
    }

    function updateConversationTimes() {
      document.querySelectorAll(".chat-contact-time")
      .forEach(timeElement => {
        timeElement.textContent = 
          formatRelativeTime(
            timeElement.dataset.sentAt
          );
      });
    }

    updateConversationTimes();
    setInterval(
      updateConversationTimes,
      60_000
    );

    function getContactByUserId(userId) {
      const numericUserId = Number(userId);
      if (!Number.isFinite(numericUserId)) {
        return null;
      }

      return document.querySelector(
        `.chat-contact[data-user-id="${numericUserId}"]`
      );
    }

    function setUnreadBadge(contact, unread) {
      if (!contact) {
        return;
      }

      let badge = contact.querySelector(".unread-badge");

      if (unread && !badge) {
        badge = document.createElement("span");
        badge.className = "unread-badge";
        badge.title = "Unread message";
        badge.setAttribute("aria-label", "Unread message");

        const topRow = contact.querySelector(".d-flex.align-items-center.w-100");
        if (topRow) {
          topRow.appendChild(badge);
        }
      } else if (!unread && badge) {
        badge.remove();
      }
    }

    function setComposerEnabled(enabled, placeholder) {
      messageInput.disabled = !enabled;
      sendButton.disabled = !enabled;
      messageInput.placeholder = placeholder;
    }

    function applyBlockStatus(status) {
      if (!status || Number(status.otherUserId) !== selectedRecipientId) {
        return;
      }

      selectedBlockStatus = status;
      chatActions.hidden = false;
      toggleBlockButton.disabled = false;

      if (status.blockedByCurrentUser) {
        toggleBlockButton.textContent = "Unblock user";
        toggleBlockButton.classList.remove("text-danger");
        blockStatusMessage.textContent =
          "You blocked this user. Unblock them to send messages.";
      } else {
        toggleBlockButton.textContent = "Block user";
        toggleBlockButton.classList.add("text-danger");
        blockStatusMessage.textContent = status.blockedByOtherUser
          ? "Messaging is unavailable for this conversation."
          : "";
      }

      blockStatusMessage.hidden = !status.communicationBlocked;

      if (status.communicationBlocked) {
        setComposerEnabled(
          false,
          status.blockedByCurrentUser
            ? "You blocked this user."
            : "Messaging is unavailable."
        );
      } else {
        setComposerEnabled(true, "Type a message...");
        messageInput.focus();
      }
    }

    async function loadBlockStatus(otherUserId) {
      selectedBlockStatus = null;
      toggleBlockButton.disabled = true;
      blockStatusMessage.hidden = true;

      try {
        const response = await fetch(
          `/api/chat/block-status?otherUserId=${otherUserId}`
        );

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error(
            `Could not load block status: ${response.status}`
          );
        }

        const status = await response.json();
        applyBlockStatus(status);
      } catch (error) {
        console.error(error);
        if (Number(otherUserId) === selectedRecipientId) {
          setComposerEnabled(false, "Messaging status could not be loaded.");
        }
      }
    }

    async function changeBlockState() {
      if (!selectedRecipientId || !selectedBlockStatus) {
        return;
      }

      toggleBlockButton.disabled = true;

      const endpoint = selectedBlockStatus.blockedByCurrentUser
        ? "/api/chat/unblock"
        : "/api/chat/block";

      try {
        const response = await fetch(
          `${endpoint}?otherUserId=${selectedRecipientId}`,
          { method: "POST" }
        );

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error(
            `Could not change block status: ${response.status}`
          );
        }

        applyBlockStatus(await response.json());
      } catch (error) {
        console.error(error);
        toggleBlockButton.disabled = false;
        alert("The block status could not be changed.");
      }
    }

    function openContact(contact) {
      if (!contact) {
        return false;
      }

      document
        .querySelectorAll(".chat-contact")
        .forEach(item => item.classList.remove("active"));

      contact.classList.add("active");

      selectedRecipientId = Number(contact.dataset.userId);
      selectedUserName.textContent = contact.dataset.userName;
      selectedUserAvatar.textContent = contact.dataset.userInitials;

      chatActions.hidden = false;
      setComposerEnabled(false, "Loading conversation...");
      loadConversation(selectedRecipientId);
      loadBlockStatus(selectedRecipientId);
      return true;
    }


    async function markOpenConversationAsRead(otherUserId) {
      try {
        const response = await fetch(
          `/api/chat/messages/read?otherUserId=${otherUserId}`,
          { method: "POST" }
        );

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error(
            `Could not mark conversation as read: ${response.status}`
          );
        }

        setUnreadBadge(getContactByUserId(otherUserId), false);
      } catch (error) {
        console.error(error);
      }
    }

    function updateContactPreview(message) {
      const senderId = Number(message.senderId);
      const recipientId = Number(message.recipientId);

      const sentByCurrentUser = senderId === currentUserId;

      const otherUserId = sentByCurrentUser ? recipientId : senderId;

      const contact = getContactByUserId(otherUserId);

      if (!contact) {
        window.location.reload();
        return;
      }

      const preview = contact.querySelector(".chat-contact-preview");
      const time = contact.querySelector(".chat-contact-time");

      preview.textContent = `${sentByCurrentUser ? "You: " : ""}${message.content}`;
      time.dataset.sentAt = message.sentAt;
      time.textContent = formatRelativeTime(message.sentAt);

      document.getElementById("chat-contacts").prepend(contact);
    }

    const noSearchResults = document.createElement("p");
    noSearchResults.className = "p-3 text-muted text-center";
    noSearchResults.textContent = "No matching conversations.";
    noSearchResults.hidden = true;

    contactsContainer.appendChild(noSearchResults);

    contactSearch.addEventListener("input", () => {
      const searchText =
        contactSearch.value.trim().toLowerCase();

      let visibleContacts = 0;

      contactElements.forEach(contact => {
        const contactName = 
          (contact.dataset.userName || "")
            .toLowerCase();

        const matchesSearch = contactName.includes(searchText);
        contact.hidden = !matchesSearch;

        if (matchesSearch) {
          visibleContacts++;
        }
      });

      noSearchResults.hidden = searchText === "" || visibleContacts > 0;
    })
    const currentUserId = Number(chatApp.dataset.currentUserId);

    let selectedRecipientId = null;
    let selectedBlockStatus = null;
    let stompClient = null;

    function formatMessageTime(sentAt) {
      if (!sentAt) {
        return "";
      }

      return new Date(sentAt).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function displayMessage(message) {
      const messageElement = document.createElement("div");

      const sentByCurrentUser = Number(message.senderId) === currentUserId;

      messageElement.className = `chat-message ${sentByCurrentUser ? "me" : "them"}`;

      const bubbleElement = document.createElement("div");
      bubbleElement.className = "chat-bubble";

      const contentElement = document.createElement("span");
      contentElement.textContent = message.content;

      const timeElement = document.createElement("span");
      timeElement.className = "chat-time";
      timeElement.textContent = 
        formatMessageTime(message.sentAt);

      bubbleElement.appendChild(contentElement);
      bubbleElement.appendChild(timeElement);
      messageElement.appendChild(bubbleElement);
      messageContainer.appendChild(messageElement);

      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    async function loadConversation(otherUserId) {
      connectionStatus.hidden = false;
      messageContainer.replaceChildren();

      try {
        const response = await fetch(
          `/api/chat/messages?otherUserId=${otherUserId}`
        );

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error(
            `Could not load conversation: ${response.status}`
          );
        }

        const messages = await response.json();

        if (Number(otherUserId) !== selectedRecipientId) {
          return;
        }

        setUnreadBadge(getContactByUserId(otherUserId), false);

        if (messages.length === 0) {
          const emptyMessage = document.createElement("p");
          emptyMessage.className = "text-center text-muted";
          emptyMessage.textContent = "No messages yet. Start the conversation!";
          messageContainer.appendChild(emptyMessage);
          return;
        }

        messages.forEach(displayMessage);
      } catch (error) {
        console.error(error);

        const errorMessage = document.createElement("p");
        errorMessage.className = "text-center text-danger";
        errorMessage.textContent = "The conversation could not be loaded";

        messageContainer.appendChild(errorMessage);
      }
    }

    toggleBlockButton.addEventListener("click", changeBlockState);

    document
      .querySelectorAll(".chat-contact")
      .forEach(contact => {
        contact.addEventListener("click", event => {
          event.preventDefault();
          openContact(contact);
        });
      });

    const requestedUserId = chatApp.dataset.requestedUserId;
    if (requestedUserId) {
      openContact(getContactByUserId(requestedUserId));
    }

      const webSocketProtocol = location.protocol === "https:" ? "wss" : "ws";

      stompClient = new StompJs.Client({
        brokerURL: `${webSocketProtocol}://${location.host}/ws-chat`,

        reconnectDelay: 5000,

        onConnect: () => {
          connectionStatus.textContent = "Connected!";
          connectionStatus.className = "text-success";

          stompClient.subscribe(
          "/user/queue/messages",
          frame => {
            const message = JSON.parse(frame.body);

            updateContactPreview(message);

            const senderId = Number(message.senderId);
            const isIncomingMessage = senderId !== currentUserId;
            const isOpenConversation = senderId === selectedRecipientId;

            if (isIncomingMessage && !isOpenConversation) {
              setUnreadBadge(getContactByUserId(senderId), true);
            } else if (isIncomingMessage && isOpenConversation) {
              markOpenConversationAsRead(senderId);
            }

            if (selectedRecipientId === null) {
            return;
            }

            const belongsToOpenConversation =
              (
                Number(message.senderId) === currentUserId &&
                Number(message.recipientId) === selectedRecipientId
              ) || (
                Number(message.senderId) === selectedRecipientId &&
                Number(message.recipientId) === currentUserId
              )
            if (belongsToOpenConversation) {
              const emptyMessage = messageContainer.querySelector(".text-center.text-muted");

              if (emptyMessage) {
                emptyMessage.remove();
              }

              displayMessage(message);
            }
          }
          );

          stompClient.subscribe(
            "/user/queue/block-status",
            frame => {
              const status = JSON.parse(frame.body);
              applyBlockStatus(status);
            }
          );

          stompClient.subscribe(
            "/user/queue/chat-errors",
            frame => {
              const error = JSON.parse(frame.body);

              if (error.code === "CHAT_BLOCKED") {
                if (selectedRecipientId !== null) {
                  loadBlockStatus(selectedRecipientId);
                }
                alert(error.message);
              }
            }
          );
        },

        onWebSocketClose: () => {
          connectionStatus.textContent = "Disconnected";
          connectionStatus.className = "text-danger";
        },

        onStompError: frame => {
          console.error("STOMP error:", frame);

          connectionStatus.textContent = "Connection error";
          connectionStatus.className = "text-danger";
        }
      });

      stompClient.activate();

      messageForm.addEventListener("submit", event=> {
        event.preventDefault();

        const content = messageInput.value.trim();

        if (
          !selectedRecipientId
          || content === ""
          || messageInput.disabled
          || (selectedBlockStatus
              && selectedBlockStatus.communicationBlocked)
        ) {
          return;
        }

        if (!stompClient.connected) {
          alert("The chat connection is not ready.");
          return;
        }

        stompClient.publish({
          destination: "/app/chat.send",
          body: JSON.stringify({
            recipientId: selectedRecipientId,
            content: content
          })
        });

        messageInput.value = "";
        messageInput.focus();
      })
  })

</script>

<th:block th:replace="~{fragments/layout :: bodyEnd}"></th:block>
