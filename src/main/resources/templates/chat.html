<th:block th:replace="~{fragments/layout :: head('Chat')}"></th:block>
<th:block th:replace="~{fragments/layout :: bodyStart}"></th:block>
<input type="hidden" id="activeMenuItem" name="activeMenuItem" value="menu-chat" />

    <style>
      .overflow-hidden {
        overflow: hidden !important;
      }

      .overflow-auto {
        overflow: auto !important;
      }

      .flex-shrink-0 {
        flex-shrink: 0 !important;
      }

      .chat-app {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 0;
        height: calc(100vh - 14rem);
        min-height: 40rem;
        border-radius: 0.25rem;
        overflow: hidden;
        margin-bottom: 0;
        background: #ffffff;
        border: 1px solid #dee2e6;
      }
      @media (max-width: 768px) {
        .chat-app {
          grid-template-columns: 1fr;
        }
        .chat-app .chat-contacts {
          display: none;
        }
      }
      .chat-contacts {
        background: #f4f6f9;
        border-right: 1px solid #dee2e6;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .chat-contact {
        display: flex;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        cursor: pointer;
        border-bottom: 1px solid #dee2e6;
        text-decoration: none;
        color: inherit;
      }
      .chat-contact:hover {
        background: #ffffff;
      }
      .chat-contact.active {
        background: #ffffff;
        border-left: 3px solid #007bff;
        padding-left: calc(1rem - 3px);
      }
      .chat-avatar {
        position: relative;
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.8rem;
      }
      .chat-avatar.online::after {
        content: '';
        position: absolute;
        bottom: 0;
        right: 0;
        width: 10px;
        height: 10px;
        background: #28a745;
        border: 2px solid #ffffff;
        border-radius: 50%;
      }
      .chat-conversation {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .chat-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #dee2e6;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background: #f4f6f9;
      }
      .chat-message {
        display: flex;
        margin-bottom: 0.75rem;
      }
      .chat-message.me {
        justify-content: flex-end;
      }
      .chat-bubble {
        max-width: 70%;
        padding: 0.5rem 0.75rem;
        border-radius: 1rem;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .chat-message.them .chat-bubble {
        background: #ffffff;
        border: 1px solid #dee2e6;
        border-bottom-left-radius: 0.25rem;
      }
      .chat-message.me .chat-bubble {
        background: #007bff;
        color: #fff;
        border-bottom-right-radius: 0.25rem;
      }
      .chat-time {
        font-size: 0.7rem;
        opacity: 0.7;
        display: block;
        margin-top: 0.15rem;
      }
      .chat-composer {
        padding: 0.75rem;
        border-top: 1px solid #dee2e6;
      }
    </style>

<main class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>
            Chat
          </h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item active">Chat</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div 
      class="card card-primary card-outline chat-app"
      id="chat-app"
      th:attr="data-current-user-id=${currentUser.id}"
      >
        <!-- Contacts -->
        <aside class="chat-contacts">
          <div class="p-3 border-bottom">
            <div class="input-group input-group-sm">
              <span class="input-group-text bg-white">
                <i class="fas fa-search" aria-hidden="true"></i>
              </span>
              <!--Search feature-->
              <input type="search" class="form-control" placeholder="Search contacts…" id="contact-search" aria-label="Search contacts">
              <!--New chat-->
              <button
                type="button"
                class="btn btn-primary btn-sm btn-block mt-2"
                id="new-chat-button"
                >
                  <i class="fas fa-plus mr-l"></i>
                New Chat
              </button>

              <div
                id="new-chat-users"
                class="border-bottom overflow-auto mx-auto my-2"
                style="width: 90%;"
                hidden>
              </div>
            </div>
          </div>
          <div class="flex-grow-1 overflow-auto" id="chat-contacts">
            <a
              href="#"
              class="chat-contact"
              th:each="contact : ${contacts}"
              th:attr="
                data-user-id=${contact.userId},
                data-user-name=${contact.firstName + ' ' + contact.lastName},
                data-user-initials=${#strings.substring(contact.firstName, 0 , 1) + #strings.substring(contact.lastName, 0, 1)}
                "
              >
                <span
                  class="chat-avatar bg-primary text-white"
                  th:text="${#strings.substring(contact.firstName, 0, 1) + #strings.substring(contact.lastName, 0, 1)}"
                  >
                  AB
                </span>

                <div class="flex-grow-1 overflow-hidden">
                  <div class="d-flex align-items-center w-100">
                    <p
                      class="mb-0 text-truncate font-weight-bold flex-grow-1"
                      th:text="${contact.firstName + ' ' + contact.lastName}"
                      >
                        First Last
                    </p>

                    <small
                      class="text-muted flex-shrink-0 ml-2 chat-contact-time"
                      th:attr="data-sent-at=${contact.lastMessageAt}"
                      ></small>
                  </div>

                  <small
                    class="text-truncate text-muted d-block chat-contact-preview"
                    >
                      <span
                        th:if="${contact.lastMessageSentByCurrentUser}"
                        >You: </span><span
                        th:text="${contact.lastMessage}"
                        >Latest message</span>
                  </small>
                </div>
            </a>

            <p
              class="p-3 text-muted"
              th:if="${#lists.isEmpty(contacts)}"
              >
              No conversations yet.
            </p>
          </div>
        </aside>

        <!-- Conversation -->
        <section class="chat-conversation">
          <header class="chat-header">
            <span
              class="chat-avatar bg-primary text-white"
              id="selected-user-avatar"
              >
              ?
            </span>

            <div class="flex-grow-1">
              <p
                class="mb-0 font-weight-bold"
                id="selected-user-name"
                >
                Select a conversation
              </p>

              <small hidden class="text-muted" id="connection-status">
                Connecting...
              </small>
            </div>
          </header>

          <div class="chat-messages" id="chat-messages">
            <p class="text-center text-muted" id="empty-chat-message">
              Select a user to view your conversation.
            </p>
          </div>

          <form class="chat-composer" id="chat-composer">
            <div class="input-group">
              <input
                type="text"
                class="form-control"
                placeholder="Select a user first.."
                aria-label="Type a message"
                id="chat-input"
                maxlength="300"
                autocomplete="off"
                disabled
                >
                <button
                  class="btn btn-primary"
                  id="send-message-button"
                  type="submit"
                  disabled
                  >
                    <i
                      class="fas fa-paper-plane"
                      aria-hidden="true"
                      ></i>
                </button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const chatApp = document.getElementById("chat-app");
    const messageContainer =
      document.getElementById("chat-messages");
    const messageForm =
      document.getElementById("chat-composer");
    const messageInput =
      document.getElementById("chat-input");
    const sendButton = 
      document.getElementById("send-message-button");
    const selectedUserName =
      document.getElementById("selected-user-name");
    const selectedUserAvatar =
      document.getElementById("selected-user-avatar");
    const connectionStatus = 
      document.getElementById("connection-status");
    const contactSearch = 
      document.getElementById("contact-search")
    const contactsContainer = 
      document.getElementById("chat-contacts")

    const contactElements =
      Array.from(document.querySelectorAll(".chat-contact"));
    
    const newChatButton = 
      document.getElementById("new-chat-button");
    const newChatUsers =
      document.getElementById("new-chat-users");

    let availableChatUsersLoaded = false;

    newChatButton.addEventListener("click", async () => {
      newChatUsers.hidden = !newChatUsers.hidden;

      if (newChatUsers.hidden || availableChatUsersLoaded) 
      {
        return
      };

      try {
        const response = await fetch("/api/chat/users");

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error("Could not load users: ${response.status}");
        }

        const users = await response.json();

        newChatUsers.replaceChildren();

        users.forEach(user => {
          const button = document.createElement("button");

          button.type = "button";
          button.className = "btn btn-light btn-block text-center rounded-0";

          button.textContent = `${user.firstName} ${user.lastName}`;

          button.addEventListener("click", () => {
            startConversationWith(user);
          });

          newChatUsers.appendChild(button);
        });

        availableChatUsersLoaded = true;
      } catch (error) {
        console.error(error);

        newChatUsers.textContent = "Users could not be loaded";
      }
    })

    function startConversationWith(user) {
      selectedRecipientId = Number(user.userId);
      const fullName = `${user.firstName} ${user.lastName}`;
      const initials = `${user.firstName.charAt(0)}${user.lastName.charAt(0)}`;

      selectedUserName.textContent = fullName;
      selectedUserAvatar.textContent = initials.toUpperCase();

      messageInput.disabled = false;
      sendButton.disabled = false;
      messageInput.placeholder = "Type a message...";

      messageContainer.replaceChildren();

      const emptyMessage = dfocument.createElement("p");
      emptyMessage.className = "text-center text-muted";
      emptyMessage.textContent = `Start a conversation with ${fullName}!`;

      messageContainer.appendChild(emptyMessage);

      newChatUsers.hidden = true;
      messageInput.focus();
    }

    const relativeTimeFormatter = 
        new Intl.RelativeTimeFormat("en", {
          numeric: "always"
        });
      
    function formatRelativeTime(timestamp) {
      if (!timestamp) {
        return "";
      }

      const messageTime = 
        new Date(timestamp).getTime();

      if (Number.isNaN(messageTime)) {
        return "";
      }

      const differenceInSeconds = 
        Math.round(
          (messageTime - Date.now()) / 1000);

      const absoluteSeconds = 
        Math.abs(differenceInSeconds);

      if (absoluteSeconds < 60) {
        return "just now";
      }

      if (absoluteSeconds < 3600) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 60),
          "minute"
        )
      };

      if (absoluteSeconds < 86400) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 3600),
          "hour"
        );
      }

      if (absoluteSeconds < 604800) {
        return relativeTimeFormatter.format(
          Math.round(differenceInSeconds / 86400),
          "day"
        );
      }

      return new Date(timestamp).toLocaleDateString();
    }

    function updateConversationTimes() {
      document.querySelectorAll(".chat-contact-time")
      .forEach(timeElement => {
        timeElement.textContent = 
          formatRelativeTime(
            timeElement.dataset.sentAt
          );
      });
    }

    updateConversationTimes();
    setInterval(
      updateConversationTimes,
      60_000
    );

    function updateContactPreview(message) {
      const senderId = Number(message.senderId);
      const recipientId = Number(message.recipientId);

      const sentByCurrentUser = senderId === currentUserId;

      const otherUserId = sentByCurrentUser ? recipientId : senderId;

      const contact = document.querySelector(`.chat-contact[data-user-id="${otherUserId}"]`);

      if (!contact) {
        window.location.reload();
        return;
      }

      const preview = contact.querySelector(".chat-contact-preview");
      const time = contact.querySelector(".chat-contact-time");

      preview.textContent = `${sentByCurrentUser ? "You: " : ""}${message.content}`;
      time.dataset.sentAt = message.sentAt;
      time.textContent = formatRelativeTime(message.sentAt);

      document.getElementById("chat-contacts").prepend(contact);
    }

    const noSearchResults = document.createElement("p");
    noSearchResults.className = "p-3 text-muted text-center";
    noSearchResults.textContent = "No matching conversations.";
    noSearchResults.hidden = true;

    contactsContainer.appendChild(noSearchResults);

    contactSearch.addEventListener("input", () => {
      const searchText =
        contactSearch.value.trim().toLowerCase();

      let visibleContacts = 0;

      contactElements.forEach(contact => {
        const contactName = 
          (contact.dataset.userName || "")
            .toLowerCase();

        const matchesSearch = contactName.includes(searchText);
        contact.hidden = !matchesSearch;

        if (matchesSearch) {
          visibleContacts++;
        }
      });

      noSearchResults.hidden = searchText === "" || visibleContacts > 0;
    })
    const currentUserId = Number(chatApp.dataset.currentUserId);

    let selectedRecipientId = null;
    let stompClient = null;

    function formatMessageTime(sentAt) {
      if (!sentAt) {
        return "";
      }

      return new Date(sentAt).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function displayMessage(message) {
      const messageElement = document.createElement("div");

      const sentByCurrentUser = Number(message.senderId) === currentUserId;

      messageElement.className = `chat-message ${sentByCurrentUser ? "me" : "them"}`;

      const bubbleElement = document.createElement("div");
      bubbleElement.className = "chat-bubble";

      const contentElement = document.createElement("span");
      contentElement.textContent = message.content;

      const timeElement = document.createElement("span");
      timeElement.className = "chat-time";
      timeElement.textContent = 
        formatMessageTime(message.sentAt);

      bubbleElement.appendChild(contentElement);
      bubbleElement.appendChild(timeElement);
      messageElement.appendChild(bubbleElement);
      messageContainer.appendChild(messageElement);

      messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    async function loadConversation(otherUserId) {
      connectionStatus.hidden = false;
      messageContainer.replaceChildren();

      try {
        const response = await fetch(
          `/api/chat/messages?otherUserId=${otherUserId}`
        );

        if (response.status === 401) {
          window.location.href = "/login";
          return;
        }

        if (!response.ok) {
          throw new Error(
            `Could not load conversation: ${response.status}`
          );
        }

        const messages = await response.json();

        if (messages.length === 0) {
          const emptyMessage = document.createElement("p");
          emptyMessage.className = "text-center text-muted";
          emptyMessage.textContent = "No messages yet. Start the conversation!";
          messageContainer.appendChild(emptyMessage);
          return;
        }

        messages.forEach(displayMessage);
      } catch (error) {
        console.error(error);

        const errorMessage = document.createElement("p");
        errorMessage.className = "text-center text-danger";
        errorMessage.textContent = "The conversation could not be loaded";

        messageContainer.appendChild(errorMessage);
      }
    }

    document
      .querySelectorAll(".chat-contact")
      .forEach(contact => {
        contact.addEventListener("click", event => {
          event.preventDefault();

          document
            .querySelectorAll(".chat-contact")
            .forEach(item => 
              item.classList.remove("active")
            );

          contact.classList.add("active");

          selectedRecipientId = Number(contact.dataset.userId);

          selectedUserName.textContent = contact.dataset.userName;
          selectedUserAvatar.textContent = contact.dataset.userInitials;

          messageInput.disabled = false;
          sendButton.disabled = false;
          messageInput.placeholder = "Type a message....";
          messageInput.focus();

          loadConversation(selectedRecipientId);
        });
      });

      const webSocketProtocol = location.protocol === "https:" ? "wss" : "ws";

      stompClient = new StompJs.Client({
        brokerURL: `${webSocketProtocol}://${location.host}/ws-chat`,

        reconnectDelay: 5000,

        onConnect: () => {
          connectionStatus.textContent = "Connected!";
          connectionStatus.className = "text-success";

          stompClient.subscribe(
          "/user/queue/messages",
          frame => {
            const message = JSON.parse(frame.body);

            updateContactPreview(message);

            if (selectedRecipientId === null) {
            return;
            }

            const belongsToOpenConversation =
              (
                Number(message.senderId) === currentUserId &&
                Number(message.recipientId) === selectedRecipientId
              ) || (
                Number(message.senderId) === selectedRecipientId &&
                Number(message.recipientId) === currentUserId
              )
            if (belongsToOpenConversation) {
              const emptyMessage = messageContainer.querySelector(".text-center.text-muted");

              if (emptyMessage) {
                emptyMessage.remove();
              }

              displayMessage(message);
            }
          }
          );
        },

        onWebSocketClose: () => {
          connectionStatus.textContent = "Disconnected";
          connectionStatus.className = "text-danger";
        },

        onStompError: frame => {
          console.error("STOMP error:", frame);

          connectionStatus.textContent = "Connection error";
          connectionStatus.className = "text-danger";
        }
      });

      stompClient.activate();

      messageForm.addEventListener("submit", event=> {
        event.preventDefault();

        const content = messageInput.value.trim();

        if (!selectedRecipientId || content === "") {
          return;
        }

        if (!stompClient.connected) {
          alert("The chat connection is not ready.");
          return;
        }

        stompClient.publish({
          destination: "/app/chat.send",
          body: JSON.stringify({
            recipientId: selectedRecipientId,
            content: content
          })
        });

        messageInput.value = "";
        messageInput.focus();
      })
  })

</script>

<th:block th:replace="~{fragments/layout :: bodyEnd}"></th:block>
