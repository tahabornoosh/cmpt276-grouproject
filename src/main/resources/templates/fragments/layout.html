<script>
(function () {
  if (window.jQuery && window.jQuery.ui) {
    window.jQuery.widget.bridge('uibutton', window.jQuery.ui.button);
  }
  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\/+^])/g, '\$1') + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }
  function setCookie(name, value, days) {
    var expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
  }
  function applyTheme(theme) {
    var dark = theme === 'dark';
    document.body.classList.toggle('dark-mode', dark);
    var nav = document.getElementById('mainNavbar');
    if (nav) {
      nav.classList.toggle('navbar-white', !dark);
      nav.classList.toggle('navbar-light', !dark);
      nav.classList.toggle('navbar-dark', dark);
      nav.classList.toggle('navbar-gray-dark', dark);
    }
    var icon = document.querySelector('#themeToggle i');
    if (icon) {
      icon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
    }
  }
  document.addEventListener('DOMContentLoaded', function () {
    var savedTheme = getCookie('adminlte-theme') || 'light';
    applyTheme(savedTheme);
    var themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', function () {
        var nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
        setCookie('adminlte-theme', nextTheme, 365);
        applyTheme(nextTheme);
      });
    }
    var activeInput = document.getElementById('activeMenuItem');
    if (activeInput && activeInput.value) {
      var activeLink = document.getElementById(activeInput.value);
      if (activeLink) {
        activeLink.classList.add('active');
        var tree = activeLink.closest('.nav-treeview');
        if (tree) {
          var parentItem = tree.closest('.nav-item');
          if (parentItem) parentItem.classList.add('menu-open');
          var parentLink = parentItem ? parentItem.querySelector('.nav-link') : null;
          if (parentLink) parentLink.classList.add('active');
        }
      }
    }
  });
})();
</script>
