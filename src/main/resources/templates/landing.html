
<th:block th:replace="~{fragments/layout :: head('Home')}"></th:block>
<th:block th:replace="~{fragments/layout :: bodyStart}"></th:block>
<input type="hidden" id="activeMenuItem" name="activeMenuItem" value="menu-dashboard" />

<main class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Welcome<span th:if="${currentUser}" th:text="', ' + ${currentUser.first_name}"></span></h1>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div th:if="${currentUser.isAdmin()}" class="row">
          <div class="col">
            <!-- small box -->
            <div class="small-box bg-danger" style="width:100%">
              <div class="inner">
                <h3>You are an Admin</h3>

                <p>You have management permissions</p>
              </div>
              <div class="icon">
                <i class="ion ion-pie-graph"></i>
              </div>
              <a href="/admin" class="small-box-footer">Go to Admin Dashboard<i class="fas fa-arrow-circle-right"></i></a>
            </div>
          </div>
        </div>
              <div th:if="${currentUser.isMod()}" class="row">
          <div class="col">
            <!-- small box -->
            <div class="small-box bg-primary" style="width:100%">
              <div class="inner">
                <h3>You are a Moderator</h3>

                <p>You have limited management permissions</p>
              </div>
              <div class="icon">
                <i class="ion ion-pie-graph"></i>
              </div>
              <a href="/admin" class="small-box-footer">Go to Admin Dashboard<i class="fas fa-arrow-circle-right"></i></a>
            </div>
          </div>
        </div>
      <div class="card" th:if="${currentUser}">
        <div class="card-header"><h3 class="card-title">Your Details</h3></div>
        <div class="card-body">
          <p><strong>Name:</strong> <span th:text="${currentUser.first_name} + ' ' + ${currentUser.last_name}"></span></p>
          <p><strong>Email:</strong> <span th:text="${currentUser.email}"></span></p>
          <p><strong>Gender:</strong> <span th:text="${currentUser.gender}"></span></p>
          <a th:href="@{'/profile/' + ${currentUser.id}}" class="btn btn-primary btn-sm">View my public profile</a>
          <a th:href="@{'/account/edit/' + ${currentUser.id}}" class="btn btn-secondary btn-sm">Edit account or change password</a>
        </div>
      </div>
    </div>
  </section>
</main>

<th:block th:replace="~{fragments/layout :: bodyEnd}"></th:block>
