<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FriendFinderSFU | Login</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="/alte/plugins/fontawesome-free/css/all.min.css">

  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="/alte/plugins/icheck-bootstrap/icheck-bootstrap.min.css">

  <!-- Theme style -->
  <link rel="stylesheet" href="/alte/dist/css/adminlte.min.css">
</head>

<body class="hold-transition login-page">
<div class="login-box">

  <div class="login-logo">
    <a href="#"><b>FriendFinder</b>SFU</a>
  </div>

  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Sign in to your account</p>

      <div th:if="${param.error}" class="alert alert-danger text-center">
        Invalid email or password.
      </div>

      <div th:if="${param.success}" class="alert alert-success text-center">
        You have successfully logged out.
      </div>

      <div th:if="${param.registered}" class="alert alert-success text-center">
        Account created successfully. Please log in.
      </div>

      <form action="/process_login" method="post">
        <div class="input-group mb-3">
          <input type="email" name="email" class="form-control" placeholder="SFU Email" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>

        <div class="input-group mb-3">
          <input type="password" name="password" class="form-control" placeholder="Password" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
              <input type="checkbox" id="remember">
              <label for="remember">
                Remember Me
              </label>
            </div>
          </div>

          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          </div>
        </div>
      </form>

      <p class="mb-0 mt-3">
        <a href="/signup" class="text-center">Register a new account</a>
      </p>

    </div>
  </div>
</div>

<!-- jQuery -->
<script src="/alte/plugins/jquery/jquery.min.js"></script>

<!-- Bootstrap 4 -->
<script src="/alte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- AdminLTE App -->
<script src="/alte/dist/js/adminlte.min.js"></script>
</body>
</html>
